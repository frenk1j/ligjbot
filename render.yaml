# Deploy në Render: https://render.com
# 1. Lidhe repo-n GitHub
# 2. New → Blueprint → zgjidh këtë repo
# 3. Vendos env vars (GROQ, Firebase) te Dashboard

services:
  - type: web
    name: ligjbot
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      if [ ! -d "vector_store/faiss_index" ]; then echo y | python scripts/ingestion.py; fi
    startCommand: bash scripts/start_production.sh
    healthCheckPath: /api/status
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: LIGJBOT_BOOTSTRAP
        value: "1"
      - key: FAST_MODE
        value: "0"
      - key: VECTOR_STORE_PATH
        value: ./vector_store/faiss_index
      - key: PDF_FOLDER
        value: ./data/pdfs
      - key: GROQ_API_KEY
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
