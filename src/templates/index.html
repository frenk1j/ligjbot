<!DOCTYPE html>
<html lang="sq" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="LIGJBOT"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="format-detection" content="telephone=no"/>
<meta name="theme-color" content="#060b16" id="theme-color-meta"/>
<link rel="manifest" href="/manifest.webmanifest"/>
<link rel="apple-touch-icon" href="/static/ligjbot-logo.png"/>
<link rel="icon" type="image/png" href="/static/ligjbot-logo.png"/>
<title>LIGJBOT — Asistenti Juridik</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:        #c9a227;
    --gold-soft:   #e4c76b;
    --red:         #9b2c2c;
    --sidebar-w:   280px;
    --radius:      8px;
    --radius-lg:   12px;
    --radius-xl:   20px;
    --max-w:       700px;
    --glass-blur:  blur(24px) saturate(1.4);
    --glass-border: rgba(255,255,255,.22);
    --glass-shadow: 0 8px 32px rgba(0,0,0,.14), inset 0 1px 0 rgba(255,255,255,.15);
    --glass-btn-bg: rgba(255,255,255,.1);
    --glass-btn-hover: rgba(255,255,255,.18);
    --glass-btn-border: rgba(255,255,255,.25);
    --sidebar-glass: rgba(15,29,61,.55);
  }

  /* Light mode */
  [data-theme="light"] {
    --navy:        #0f1d3d;
    --navy-dark:   #0a1428;
    --navy-mid:    #1a3058;
    --bg:          #f3f4f6;
    --bg-sub:      #ffffff;
    --bg-input:    #ffffff;
    --border:      #d8dde8;
    --border-soft: #e8ecf3;
    --text:        #1a2332;
    --text-muted:  #5f6b7c;
    --text-light:  #3d4a5c;
    --heading:     #0f1d3d;
    --user-bubble: #eef1f7;
    --error-bg:    #fef2f2;
    --error-border:#fecaca;
    --sidebar-bg:  #0f1d3d;
    --sidebar-text:#e8ecf3;
    --btn-primary: #0f1d3d;
    --btn-primary-hover: #1a3058;
    --watermark-opacity: 0.12;
    --sidebar-glass: rgba(15,29,61,.5);
    --glass-btn-bg: rgba(255,255,255,.14);
    --glass-btn-hover: rgba(255,255,255,.24);
  }

  /* Dark mode */
  [data-theme="dark"] {
    --navy:        #1e3a6e;
    --navy-dark:   #0a1224;
    --navy-mid:    #2a4f8f;
    --bg:          #0b1018;
    --bg-sub:      #121a28;
    --bg-input:    #121a28;
    --border:      #2a3548;
    --border-soft: #1a2436;
    --text:        #e8edf5;
    --text-muted:  #94a3b8;
    --text-light:  #b8c5d6;
    --heading:     #f0d78c;
    --user-bubble: #162033;
    --error-bg:    rgba(155,44,44,.2);
    --error-border:#9b2c2c;
    --sidebar-bg:  #070d16;
    --sidebar-text:#e8edf5;
    --btn-primary: #c9a227;
    --btn-primary-hover: #e4c76b;
    --watermark-opacity: 0.2;
    --sidebar-glass: rgba(7,13,22,.5);
  }

  html {
    height: 100%;
    /* prevent rubber-band scroll on iOS */
    overscroll-behavior: none;
  }

  body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    overscroll-behavior: none;
    padding-left:   env(safe-area-inset-left);
    padding-right:  env(safe-area-inset-right);
    transition: background .2s, color .2s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  @media (min-width: 641px) {
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 40% 55% at 0% 35%, rgba(201,162,39,.14) 0%, transparent 65%),
        radial-gradient(ellipse 35% 45% at 100% 70%, rgba(30,58,110,.1) 0%, transparent 60%),
        var(--bg);
    }
    [data-theme="light"] body::before {
      background:
        radial-gradient(ellipse 38% 50% at 0% 30%, rgba(201,162,39,.16) 0%, transparent 62%),
        radial-gradient(ellipse 32% 40% at 100% 75%, rgba(26,48,88,.08) 0%, transparent 58%),
        var(--bg);
    }
    .app {
      gap: 14px;
      padding: 14px;
      padding-top: calc(14px + env(safe-area-inset-top));
      padding-bottom: calc(14px + env(safe-area-inset-bottom));
      box-sizing: border-box;
    }
  }

  .app {
    display: flex;
    height: 100dvh;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar overlay (mobile) ───────────────────────────── */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 99;
  }
  .sidebar-overlay.open { display: block; }

  /* ── Sidebar (liquid glass) ─────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--sidebar-glass);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
    -webkit-overflow-scrolling: touch;
    transition: width .25s ease, min-width .25s ease, transform .25s ease, opacity .2s ease;
    padding-left: env(safe-area-inset-left);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    position: relative;
    z-index: 2;
  }

  @media (min-width: 641px) {
    .sidebar {
      border-radius: var(--radius-xl);
    }
  }

  .glass-btn {
    background: var(--glass-btn-bg);
    backdrop-filter: blur(12px) saturate(1.25);
    -webkit-backdrop-filter: blur(12px) saturate(1.25);
    border: 1px solid var(--glass-btn-border);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.12);
    transition: background .15s, border-color .15s, box-shadow .15s;
  }
  .glass-btn:hover {
    background: var(--glass-btn-hover);
    border-color: rgba(255,255,255,.35);
  }

  [data-theme="light"] .main .glass-btn {
    --glass-btn-bg: rgba(15,29,61,.06);
    --glass-btn-hover: rgba(15,29,61,.11);
    --glass-btn-border: rgba(15,29,61,.12);
  }

  [data-theme="light"] .starter-card.glass-card {
    background: rgba(255,255,255,.72);
    backdrop-filter: blur(14px) saturate(1.1);
    -webkit-backdrop-filter: blur(14px) saturate(1.1);
    border: 1px solid rgba(15,29,61,.08);
    box-shadow: 0 2px 12px rgba(15,29,61,.06), inset 0 1px 0 rgba(255,255,255,.8);
  }

  [data-theme="dark"] .starter-card.glass-card {
    background: rgba(255,255,255,.05);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.1);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
  }

  .app.sidebar-collapsed .sidebar {
    width: 0;
    min-width: 0;
    opacity: 0;
    pointer-events: none;
    border: none;
    box-shadow: none;
    padding: 0;
    margin: 0;
  }

  .sidebar-header {
    padding: 20px 16px 16px;
    border-bottom: 1px solid rgba(255,255,255,.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 15px;
    color: var(--sidebar-text);
    min-width: 0;
  }

  .sidebar-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 2px solid var(--gold);
    box-shadow: 0 0 12px rgba(201,162,39,.25);
    overflow: hidden;
  }
  .logo-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: inherit;
    display: block;
  }

  .sidebar-close {
    display: none;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,.85);
    font-size: 18px;
    cursor: pointer;
    padding: 8px 10px;
    line-height: 1;
    border-radius: var(--radius);
    flex-shrink: 0;
  }
  .sidebar-close:hover { color: #fff; }

  .new-chat-btn {
    display: flex; align-items: center; gap: 8px;
    margin: 12px 12px 10px;
    padding: 10px 14px;
    border-radius: var(--radius-lg);
    color: rgba(255,255,255,.92);
    cursor: pointer; font-size: 13px;
    width: calc(100% - 24px);
    text-align: left;
    font-family: inherit;
    min-height: 44px;
  }

  .sidebar-section {
    font-size: 10px; font-weight: 600;
    color: rgba(255,255,255,.35);
    text-transform: uppercase; letter-spacing: .07em;
    padding: 8px 16px 8px;
  }

  .history-list {
    padding: 0 10px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow-y: auto;
    flex: 1;
    -webkit-overflow-scrolling: touch;
  }

  .history-item {
    width: 100%;
    text-align: left;
    color: rgba(255,255,255,.88);
    border-radius: var(--radius-lg);
    padding: 10px 10px;
    cursor: pointer;
    font-size: 13px;
    line-height: 1.35;
    min-height: 48px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    flex-direction: column;
    transition: background .15s, border-color .15s, color .15s;
    font-family: inherit;
  }
  .history-item.glass-btn:hover { color: #fff; }
  .history-item.active {
    background: var(--glass-btn-hover);
    border-color: rgba(255,255,255,.3);
    color: #fff;
  }
  .history-title {
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
  }
  .history-sub {
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 11px;
    opacity: .65;
    margin-top: 2px;
  }

  .suggestion-btn {
    display: block; width: 100%;
    text-align: left; background: none; border: none;
    color: rgba(255,255,255,.55); font-size: 13px;
    padding: 9px 16px;
    cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: background .15s, color .15s;
    font-family: inherit;
    min-height: 44px;
    display: flex; align-items: center;
  }
  .suggestion-btn:hover, .suggestion-btn:active {
    background: rgba(255,255,255,.07);
    color: rgba(255,255,255,.9);
  }

  /* ── Main ────────────────────────────────────────────────── */
  .main {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden;
    background: var(--bg);
    transition: background .2s;
    min-width: 0;
  }

  /* ── Topbar ──────────────────────────────────────────────── */
  .topbar {
    --topbar-h: 52px;
    padding: 0 16px;
    min-height: var(--topbar-h);
    height: var(--topbar-h);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    background: var(--bg);
    transition: background .2s, border-color .2s;
  }

  @media (max-width: 640px) {
    .topbar {
      padding-top: env(safe-area-inset-top);
      min-height: calc(var(--topbar-h) + env(safe-area-inset-top));
      height: calc(var(--topbar-h) + env(safe-area-inset-top));
      box-sizing: border-box;
    }
  }

  .sidebar-toggle-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    align-self: center;
    color: var(--text-light);
    font-size: 18px;
    cursor: pointer;
    padding: 0;
    border-radius: 8px;
    line-height: 1;
    width: 40px;
    height: 40px;
    min-width: 40px;
    min-height: 40px;
    flex-shrink: 0;
    font-family: inherit;
    margin: 0;
  }
  .hamburger-btn { display: none; }
  .sidebar-toggle-btn.glass-btn:hover { border-color: var(--gold); }

  .topbar-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 600;
    line-height: 1;
    color: var(--heading);
    transition: color .2s;
    flex-shrink: 0;
  }
  .topbar-divider {
    width: 1px; height: 18px; background: var(--border); margin: 0 2px;
    transition: background .2s;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-muted); transition: background .3s; flex-shrink: 0;
  }
  .status-dot.ready   { background: #2d8a50; }
  .status-dot.error   { background: var(--red); }
  .status-dot.loading { background: #e8a020; animation: pulse 1.2s infinite; }

  .topbar-label {
    font-size: 13px;
    line-height: 1.2;
    color: var(--text-light);
    transition: color .2s;
    flex: 1;
    min-width: 0;
    align-self: center;
  }

  .telefon-btn {
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 0 12px;
    min-height: 36px;
    border-radius: 8px;
    color: var(--heading);
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    flex-shrink: 0;
    font-family: inherit;
    white-space: nowrap;
  }
  .telefon-btn.glass-btn:hover { border-color: var(--gold); }

  /* Theme toggle button */
  .theme-btn {
    margin-left: 6px;
    color: var(--text-light);
    border-radius: 8px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .15s, border-color .15s, color .15s;
    flex-shrink: 0;
  }
  .theme-btn svg {
    width: 18px;
    height: 18px;
    display: block;
  }
  .theme-btn.glass-btn:hover { border-color: var(--gold); color: var(--heading); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Messages ────────────────────────────────────────────── */
  .messages {
    flex: 1; overflow-y: auto; padding: 0 0 24px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    position: relative;
    isolation: isolate;
  }

  .chat-watermark {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .chat-watermark img {
    width: min(480px, 72vw);
    max-height: 72vh;
    object-fit: contain;
    filter: blur(5px) saturate(1.05);
    opacity: var(--watermark-opacity);
  }

  [data-theme="light"] .chat-watermark img {
    filter: none;
    opacity: var(--watermark-opacity);
  }

  .messages-inner {
    position: relative;
    z-index: 1;
    min-height: 100%;
  }

  .message-row,
  .empty-state {
    position: relative;
  }
  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Empty state */
  .empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100%; gap: 14px; padding: 32px 24px; text-align: center;
  }
  .empty-state h1 {
    font-size: 26px; font-weight: 700; color: var(--heading);
    letter-spacing: -.02em;
  }
  .empty-state p  { color: var(--text-muted); max-width: 420px; font-size: 14px; line-height: 1.55; }

  .starter-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 8px; max-width: 500px; width: 100%; margin-top: 8px;
  }
  .starter-card {
    border-radius: var(--radius-lg);
    padding: 12px 14px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    text-align: left;
    transition: border-color .15s, background .15s, box-shadow .15s;
    line-height: 1.4;
    font-family: inherit;
    min-height: 44px;
  }
  .starter-card.glass-card:hover, .starter-card.glass-card:active {
    border-color: var(--gold);
    box-shadow: 0 4px 16px rgba(0,0,0,.1);
  }

  /* Message row */
  .message-row {
    display: flex; padding: 16px 20px; gap: 12px;
    max-width: calc(var(--max-w) + 80px);
    margin: 0 auto; width: 100%;
  }
  .message-row.bot-row { border-top: 1px solid var(--border-soft); transition: border-color .2s; }

  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0; margin-top: 3px; font-weight: 600;
  }
  .avatar.user { background: var(--btn-primary); color: #fff; }
  .avatar.bot  {
    background: var(--bg-sub);
    color: var(--gold);
    font-size: 11px;
    font-weight: 700;
    border: 1px solid var(--gold);
    overflow: hidden;
    padding: 0;
  }
  .avatar.bot .logo-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .message-content { flex: 1; min-width: 0; }
  .message-author {
    font-size: 11px; font-weight: 600; margin-bottom: 4px;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em;
    transition: color .2s;
  }
  .meta-row {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .meta-chip {
    font-size: 11px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    background: var(--bg-sub);
    border-radius: 999px;
    padding: 2px 8px;
  }
  .message-text {
    color: var(--text); white-space: pre-wrap; word-break: break-word;
    font-size: 15px; transition: color .2s;
  }
  .message-text.user-text {
    background: var(--user-bubble);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 10px 14px;
    display: inline-block;
    max-width: 100%;
    transition: background .2s, border-color .2s;
  }

  [data-theme="light"] .message-text.user-text {
    background: rgba(255,255,255,.9);
    border-color: rgba(15,29,61,.1);
    box-shadow: 0 1px 4px rgba(15,29,61,.06);
  }

  [data-theme="dark"] .message-text.user-text {
    background: rgba(22,32,51,.85);
    border-color: rgba(255,255,255,.08);
  }

  [data-theme="light"] .message-row.bot-row {
    border-top-color: rgba(15,29,61,.06);
  }

  /* Sources */
  .sources-block {
    margin-top: 12px; display: flex; flex-wrap: wrap;
    gap: 6px; align-items: center;
  }
  .sources-label {
    font-size: 10px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: .06em;
    width: 100%; margin-bottom: 2px; transition: color .2s;
  }
  .source-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--bg-sub);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 11px;
    font-size: 12px; color: var(--heading); text-decoration: none;
    transition: background .15s, border-color .15s, color .15s;
    cursor: pointer; white-space: nowrap;
    /* touch-friendly */
    min-height: 32px;
  }
  .source-chip:hover, .source-chip:active {
    background: var(--btn-primary); color: #fff; border-color: var(--btn-primary);
  }

  /* Typing */
  .typing-dots { display: flex; gap: 4px; padding: 4px 0; }
  .typing-dots span {
    width: 6px; height: 6px; background: var(--text-muted);
    border-radius: 50%; animation: dot-bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes dot-bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

  /* Error */
  .error-msg {
    color: var(--red); background: var(--error-bg);
    border: 1px solid var(--error-border);
    border-radius: var(--radius); padding: 10px 14px; font-size: 14px;
    transition: background .2s, border-color .2s;
  }

  /* ── Input area (chat) ───────────────────────────────────── */
  .input-area {
    padding: 14px 16px;
    padding-bottom: calc(14px + env(safe-area-inset-bottom));
    flex-shrink: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    transition: background .2s, border-color .2s;
  }

  .input-wrapper {
    max-width: var(--max-w);
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 6px 6px 6px 14px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    backdrop-filter: blur(14px) saturate(1.1);
    -webkit-backdrop-filter: blur(14px) saturate(1.1);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    transition: border-color .2s, box-shadow .2s, background .2s;
  }

  [data-theme="light"] .input-wrapper {
    background: rgba(255,255,255,.88);
    border-color: rgba(15,29,61,.1);
    box-shadow: 0 2px 14px rgba(15,29,61,.06), inset 0 1px 0 rgba(255,255,255,.95);
  }

  [data-theme="dark"] .input-wrapper {
    background: rgba(18,26,40,.75);
    border-color: rgba(255,255,255,.1);
  }

  .input-wrapper:focus-within {
    border-color: rgba(201,162,39,.45);
    box-shadow: 0 0 0 1px rgba(201,162,39,.18), inset 0 1px 0 rgba(255,255,255,.06);
  }

  [data-theme="light"] .input-wrapper:focus-within {
    border-color: rgba(15,29,61,.22);
    box-shadow: 0 0 0 2px rgba(15,29,61,.08), 0 2px 14px rgba(15,29,61,.08);
  }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 16px;
    resize: none;
    max-height: 160px;
    line-height: 1.5;
    font-family: inherit;
    padding: 6px 0;
    transition: color .2s;
  }
  #user-input::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: 1px solid transparent;
    background: var(--btn-primary);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .15s, opacity .15s, border-color .15s, transform .12s;
    min-width: 38px;
  }
  .send-btn svg {
    width: 18px;
    height: 18px;
    display: block;
  }
  .send-btn:hover:not(:disabled) {
    background: var(--btn-primary-hover);
    transform: translateY(-1px);
  }
  .send-btn:active:not(:disabled) { transform: translateY(0); }
  .send-btn:disabled { opacity: .35; cursor: not-allowed; }

  [data-theme="dark"] .send-btn {
    background: rgba(201,162,39,.22);
    border-color: rgba(201,162,39,.45);
    color: var(--gold-soft);
  }
  [data-theme="dark"] .send-btn:hover:not(:disabled) {
    background: rgba(201,162,39,.38);
    border-color: var(--gold);
    color: #fff;
  }

  [data-theme="light"] .send-btn {
    background: var(--btn-primary);
    border-color: var(--btn-primary);
    color: #fff;
  }

  .input-footer {
    text-align: center; font-size: 11px; color: var(--text-muted);
    margin-top: 7px; max-width: var(--max-w);
    margin-left: auto; margin-right: auto;
    transition: color .2s;
  }

  /* ── Mobile (iOS & Android) ─────────────────────────────── */
  @media (max-width: 640px) {
    .app {
      height: 100dvh;
      min-height: -webkit-fill-available;
    }

    .main {
      min-height: 0;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      min-width: 44px;
      min-height: 44px;
      border-radius: 12px;
    }

    .sidebar-toggle-btn,
    .theme-btn,
    .hamburger-btn {
      min-width: 44px;
      min-height: 44px;
    }

    .starter-card {
      min-height: 48px;
      padding: 14px 16px;
      -webkit-user-select: none;
      user-select: none;
    }

    .topbar-label {
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .telefon-btn { display: none !important; }

    .messages {
      touch-action: pan-y;
      padding-bottom: calc(88px + env(safe-area-inset-bottom));
    }

    .input-area {
      position: fixed;
      left: 0;
      right: 0;
      bottom: var(--keyboard-offset, 0px);
      z-index: 50;
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      box-shadow: 0 -4px 24px rgba(0,0,0,.12);
    }

    [data-theme="dark"] .input-area {
      box-shadow: 0 -8px 32px rgba(0,0,0,.35);
    }

    .sidebar {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      right: auto;
      width: min(var(--sidebar-w), 88vw);
      min-width: min(var(--sidebar-w), 88vw);
      z-index: 100;
      transform: translateX(-100%);
      opacity: 1;
      pointer-events: auto;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      border-radius: 0 var(--radius-xl) var(--radius-xl) 0;
      will-change: transform;
    }

    .sidebar-close {
      display: flex;
      min-width: 44px;
      min-height: 44px;
    }

    .app.sidebar-collapsed .sidebar {
      width: min(var(--sidebar-w), 88vw);
      min-width: min(var(--sidebar-w), 88vw);
      transform: translateX(-100%);
      opacity: 1;
    }

    .sidebar.open { transform: translateX(0); }

    .sidebar-overlay.open {
      display: block;
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
    }

    .sidebar-toggle-btn { display: none; }
    .hamburger-btn { display: flex; }
    .starter-grid { grid-template-columns: 1fr; gap: 10px; }
    .message-row { padding: 12px 14px; }
    .empty-state { padding: 20px 16px 8px; }
    .empty-state h1 { font-size: 1.75rem; }
    .source-chip {
      min-height: 40px;
      padding: 8px 12px;
    }
  }

  /* PWA / Add to Home Screen (iOS & Android) */
  @media (display-mode: standalone) {
    .topbar {
      padding-top: max(env(safe-area-inset-top), 8px);
    }
  }

  body.mobile-nav-open {
    position: fixed;
    width: 100%;
    overflow: hidden;
  }
</style>
<script>window.LIGJBOT_SUGGESTIONS = {{ suggestions | tojson }};</script>
</head>
<body>
<div class="app">

  <!-- Mobile sidebar overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebarMobile()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-icon"><img class="logo-img" src="/static/ligjbot-logo.png" alt="LigjBot logo"/></div>
        LIGJBOT
      </div>
      <button class="sidebar-close glass-btn" onclick="onSidebarCloseClick()" aria-label="Mbyll sidebar">✕</button>
    </div>
    <button class="new-chat-btn glass-btn" onclick="newChat(); if(isMobile()) collapseSidebar();">✏️ &nbsp;Bisedë e re</button>
    <div class="sidebar-section">Chats</div>
    <div class="history-list" id="history-list"></div>
  </aside>

  <!-- Main panel -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <button type="button" class="sidebar-toggle-btn glass-btn" id="sidebar-toggle" onclick="toggleSidebarDesktop()" aria-label="Hap/mbyll sidebar">☰</button>
      <button type="button" class="hamburger-btn sidebar-toggle-btn glass-btn" onclick="openSidebarMobile()" aria-label="Menu">☰</button>
      <div class="topbar-logo">
        <span>LIGJBOT</span>
      </div>
      <div class="topbar-divider"></div>
      <div class="status-dot loading" id="status-dot"></div>
      <span class="topbar-label" id="topbar-label">Duke u ngarkuar…</span>
      {% if mobile_url %}
      <a href="/telefon" class="telefon-btn glass-btn" title="Hap në iPhone/Android">📱 Telefon</a>
      {% endif %}
      <button class="theme-btn glass-btn" id="theme-btn" onclick="toggleTheme()" aria-label="Ndrysho temën" type="button"></button>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="chat-watermark" aria-hidden="true">
        <img id="chat-watermark-img" src="/static/ligjbot-logo.png" alt="">
      </div>
      <div class="messages-inner" id="messages-inner">
        <div class="empty-state" id="empty-state">
          <h1>LIGJBOT</h1>
          <p>Asistenti juridik i qytetarit shqiptar. Pyet mbi të drejtat, gjobat, policinë dhe ligjet.</p>
          <div class="starter-grid" id="starter-grid"></div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="user-input"
          rows="1"
          placeholder="Shkruaj pyetjen tënde ligjore…"
          disabled
          spellcheck="false"
          autocomplete="off"
          autocapitalize="sentences"
          enterkeyhint="send"
          inputmode="text"
          aria-label="Pyetja ligjore"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled title="Dërgo" type="button" aria-label="Dërgo mesazhin">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </div>
      <div class="input-footer">
        LIGJBOT mund të bëjë gabime. Për situata serioze konsultohuni me avokat.
      </div>
    </div>

  </div>
</div>

<script>
  let isLoading = false;
  let activeChatId = null;
  let chats = [];
  let suggestionQuestions = [];
  const HISTORY_KEY = "LIGJBOT-history";

  // ── Theme ─────────────────────────────────────────────────
  const THEME_KEY = "LIGJBOT-theme";

  const ICON_SUN = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>`;
  const ICON_MOON = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  const LOGO_DARK  = "/static/ligjbot-logo.png";
  const LOGO_LIGHT = "/static/ligjbot-logo-light.png";

  function themeLogoSrc(theme) {
    return theme === "light" ? LOGO_LIGHT : LOGO_DARK;
  }

  function currentTheme() {
    return document.documentElement.getAttribute("data-theme") || "dark";
  }

  function botLogoImg() {
    return `<img class="logo-img" src="${themeLogoSrc(currentTheme())}" alt="LIGJBOT logo"/>`;
  }

  function updateThemeLogos(theme) {
    const src = themeLogoSrc(theme);
    document.querySelectorAll(".logo-img, #chat-watermark-img").forEach((el) => {
      el.src = src;
    });
  }

  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    const btn  = document.getElementById("theme-btn");
    const meta = document.getElementById("theme-color-meta");
    updateThemeLogos(theme);
    if (theme === "dark") {
      btn.innerHTML      = ICON_SUN;
      btn.title          = "Modalitet i ndritshëm";
      btn.setAttribute("aria-label", "Kaloj në modalitetin e ndritshëm");
      meta.content       = "#0b1018";
    } else {
      btn.innerHTML      = ICON_MOON;
      btn.title          = "Modalitet i errët";
      btn.setAttribute("aria-label", "Kaloj në modalitetin e errët");
      meta.content       = "#f3f4f6";
    }
  }

  function toggleTheme() {
    const current = document.documentElement.getAttribute("data-theme");
    const next    = current === "dark" ? "light" : "dark";
    applyTheme(next);
    localStorage.setItem(THEME_KEY, next);
  }

  // Apply saved theme immediately (prevents flash)
  (function () {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved) applyTheme(saved);
    else if (window.matchMedia("(prefers-color-scheme: dark)").matches) applyTheme("dark");
  })();

  const SIDEBAR_KEY = "LIGJBOT-sidebar-collapsed";

  function isMobile() {
    return window.matchMedia("(max-width: 640px)").matches;
  }

  function setSidebarCollapsed(collapsed) {
    document.querySelector(".app").classList.toggle("sidebar-collapsed", collapsed);
    if (!isMobile()) {
      localStorage.setItem(SIDEBAR_KEY, collapsed ? "1" : "0");
    }
  }

  function toggleSidebarDesktop() {
    if (isMobile()) return;
    const app = document.querySelector(".app");
    setSidebarCollapsed(!app.classList.contains("sidebar-collapsed"));
  }

  function collapseSidebar() {
    if (isMobile()) {
      closeSidebarMobile();
    } else {
      setSidebarCollapsed(true);
    }
  }

  function onSidebarCloseClick() {
    collapseSidebar();
  }

  function openSidebarMobile() {
    if (!isMobile()) {
      setSidebarCollapsed(false);
      return;
    }
    document.getElementById("sidebar").classList.add("open");
    document.getElementById("sidebar-overlay").classList.add("open");
    document.body.classList.add("mobile-nav-open");
  }

  function closeSidebarMobile() {
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("sidebar-overlay").classList.remove("open");
    document.body.classList.remove("mobile-nav-open");
  }

  function closeSidebar() {
    collapseSidebar();
  }

  (function initSidebarState() {
    if (!isMobile() && localStorage.getItem(SIDEBAR_KEY) === "1") {
      setSidebarCollapsed(true);
    }
    window.addEventListener("resize", () => {
      if (!isMobile()) closeSidebarMobile();
    });
  })();

  /** Ngrej input-in mbi tastierën (iOS Safari / Android Chrome). */
  function setupMobileKeyboard() {
    if (!window.visualViewport) return;
    const root = document.documentElement;
    const update = () => {
      if (!isMobile()) {
        root.style.removeProperty("--keyboard-offset");
        return;
      }
      const vv = window.visualViewport;
      const offset = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      root.style.setProperty("--keyboard-offset", offset + "px");
      if (document.activeElement === document.getElementById("user-input")) {
        scrollBottom();
      }
    };
    window.visualViewport.addEventListener("resize", update);
    window.visualViewport.addEventListener("scroll", update);
    update();
  }

  /** Rrëshqit sidebar-in majtas për ta mbyllur (touch). */
  function setupSidebarSwipe() {
    const sidebar = document.getElementById("sidebar");
    let startX = 0;
    let tracking = false;
    sidebar.addEventListener("touchstart", (e) => {
      if (!sidebar.classList.contains("open")) return;
      startX = e.touches[0].clientX;
      tracking = true;
    }, { passive: true });
    sidebar.addEventListener("touchmove", (e) => {
      if (!tracking) return;
      if (e.touches[0].clientX - startX < -72) {
        tracking = false;
        closeSidebarMobile();
      }
    }, { passive: true });
    sidebar.addEventListener("touchend", () => { tracking = false; }, { passive: true });
  }

  // ── Init ──────────────────────────────────────────────────
  async function init() {
    loadHistory();
    await loadSuggestions();
    await pollStatus();
    ensureActiveChat();
    renderHistory();
  }

  async function loadSuggestions() {
    try {
      let list = window.LIGJBOT_SUGGESTIONS;
      if (!Array.isArray(list) || !list.length) {
        const res = await fetch("/api/suggestions");
        list = await res.json();
      }
      suggestionQuestions = Array.isArray(list) ? list : [];

      const sidebar = document.getElementById("sidebar-suggestions");
      if (sidebar) {
        list.forEach(q => {
          const btn = document.createElement("button");
          btn.className   = "suggestion-btn";
          btn.textContent = q;
          btn.title       = q;
          btn.onclick     = () => { submitQuestion(q); closeSidebar(); };
          sidebar.appendChild(btn);
        });
      }

      const grid = document.getElementById("starter-grid");
      suggestionQuestions.slice(0, 4).forEach(q => {
        const card = document.createElement("button");
        card.className   = "starter-card glass-card";
        card.textContent = q;
        card.onclick     = () => submitQuestion(q);
        grid.appendChild(card);
      });
    } catch (e) { console.error(e); }
  }

  async function pollStatus() {
    try {
      const res  = await fetch("/api/status");
      const data = await res.json();
      const dot   = document.getElementById("status-dot");
      const label = document.getElementById("topbar-label");
      const input = document.getElementById("user-input");
      const btn   = document.getElementById("send-btn");

      if (data.ready) {
        dot.className     = "status-dot ready";
        label.textContent = data.fast_mode ? "Gati (i shpejtë)" : "Gati";
        input.disabled    = false;
        btn.disabled      = false;
      } else if (data.error) {
        dot.className     = "status-dot error";
        label.textContent = "Gabim: " + data.error;
        input.disabled    = true;
        btn.disabled      = true;
      } else {
        label.textContent = data.loading ? "Duke u ngarkuar…" : "Duke u ngarkuar…";
        setTimeout(pollStatus, 600);
      }
    } catch (e) {
      setTimeout(pollStatus, 1200);
    }
  }

  // ── New chat ──────────────────────────────────────────────
  function newChat() {
    createNewChat();
    const messages = document.getElementById("messages-inner");
    messages.innerHTML = `
      <div class="empty-state" id="empty-state">
        <h1>LIGJBOT</h1>
        <p>Asistenti juridik i qytetarit shqiptar. Pyet mbi të drejtat, gjobat, policinë dhe ligjet.</p>
        <div class="starter-grid" id="starter-grid"></div>
      </div>`;

    const grid = document.getElementById("starter-grid");
    suggestionQuestions.slice(0, 4).forEach((q) => {
      const card = document.createElement("button");
      card.className   = "starter-card glass-card";
      card.textContent = q;
      card.onclick     = () => submitQuestion(q);
      grid.appendChild(card);
    });
    persistHistory();
    renderHistory();
  }

  // ── Send ──────────────────────────────────────────────────
  function sendMessage() {
    const input = document.getElementById("user-input");
    const text  = input.value.trim();
    if (!text || isLoading) return;
    input.value = "";
    autoResize(input);
    submitQuestion(text);
  }

  async function submitQuestion(question) {
    if (isLoading) return;

    const emptyState = document.getElementById("empty-state");
    if (emptyState) emptyState.remove();

    appendMessage("user", question);
    const typingId = appendTyping();

    isLoading = true;
    document.getElementById("send-btn").disabled = true;

    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 25000);
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: question }),
        signal: controller.signal,
      });
      clearTimeout(timeoutId);

      removeTyping(typingId);
      const data = await res.json();

      if (!res.ok || data.error) {
        appendError(data.error || "Gabim i panjohur.");
      } else {
        await appendBotMessage(data.answer, data.sources, data.response_ms, data.cached);
      }
    } catch (err) {
      removeTyping(typingId);
      if (err.name === "AbortError") {
        appendError("Pergjigjja po vonon. Provo nje pyetje me te shkurter ose dergo perseri.");
      } else {
        appendError("Gabim rrjeti: " + err.message);
      }
    } finally {
      isLoading = false;
      document.getElementById("send-btn").disabled = false;
    }
  }

  // ── DOM helpers ───────────────────────────────────────────
  function appendMessage(role, text) {
    const messages = document.getElementById("messages-inner");
    const row      = document.createElement("div");
    const isUser   = role === "user";
    row.className  = "message-row" + (isUser ? "" : " bot-row");
    row.innerHTML  = `
      <div class="avatar ${isUser ? "user" : "bot"}">${isUser ? "U" : botLogoImg()}</div>
      <div class="message-content">
        <div class="message-author">${isUser ? "Ju" : "LIGJBOT"}</div>
        <div class="message-text ${isUser ? "user-text" : ""}">${escapeHtml(text)}</div>
      </div>`;
    messages.appendChild(row);
    scrollBottom();
    upsertChatMessage({
      role,
      text,
    });
  }

  async function appendBotMessage(answer, sources, responseMs, cached) {
    const messages = document.getElementById("messages-inner");
    const row      = document.createElement("div");
    row.className  = "message-row bot-row";

    let sourcesHtml = "";
    if (sources && sources.length > 0) {
      const chips = sources.map(s => {
        const label = escapeHtml(s.label);
        const page  = s.page ? `Faqe ${s.page}` : "";
        const title = [label, page].filter(Boolean).join(" · ");
        if (s.url) {
          return `<a class="source-chip" href="${escapeHtml(s.url)}" target="_blank" title="${title}">📌 ${label}${page ? ` <span style="opacity:.65">· ${page}</span>` : ""}</a>`;
        }
        return `<span class="source-chip">📌 ${title}</span>`;
      }).join("");
      sourcesHtml = `<div class="sources-block"><span class="sources-label">Burimet ligjore</span>${chips}</div>`;
    }

    const metaChips = `
      <div class="meta-row">
        ${responseMs ? `<span class="meta-chip">⚡ ${responseMs}ms</span>` : ""}
        ${cached ? `<span class="meta-chip">Cache</span>` : ""}
      </div>`;

    row.innerHTML = `
      <div class="avatar bot">${botLogoImg()}</div>
      <div class="message-content">
        <div class="message-author">LIGJBOT</div>
        <div class="message-text" id="assistant-text-${Date.now()}"></div>
        ${metaChips}
        ${sourcesHtml}
      </div>`;
    messages.appendChild(row);
    const textEl = row.querySelector(".message-text");
    await typeText(textEl, answer, 8);
    scrollBottom();
    upsertChatMessage({
      role: "assistant",
      text: answer,
      sources: sources || [],
      responseMs: responseMs || null,
      cached: !!cached,
    });
  }

  function appendTyping() {
    const messages = document.getElementById("messages-inner");
    const row      = document.createElement("div");
    row.className  = "message-row bot-row";
    const id       = "typing-" + Date.now();
    row.id         = id;
    row.innerHTML  = `
      <div class="avatar bot">${botLogoImg()}</div>
      <div class="message-content">
        <div class="message-author">LIGJBOT</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>`;
    messages.appendChild(row);
    scrollBottom();
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function appendError(msg) {
    const messages = document.getElementById("messages-inner");
    const row      = document.createElement("div");
    row.className  = "message-row bot-row";
    row.innerHTML  = `
      <div class="avatar bot">${botLogoImg()}</div>
      <div class="message-content">
        <div class="message-author">LIGJBOT</div>
        <div class="error-msg">⚠️ ${escapeHtml(msg)}</div>
      </div>`;
    messages.appendChild(row);
    scrollBottom();
    upsertChatMessage({
      role: "assistant",
      error: msg,
    });
  }

  function scrollBottom() {
    const m = document.getElementById("messages");
    m.scrollTop = m.scrollHeight;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  async function typeText(el, text, delayMs = 8) {
    const safe = String(text || "");
    if (!safe.length) {
      el.textContent = "";
      return;
    }
    if (isMobile()) {
      el.textContent = safe;
      return;
    }
    let i = 0;
    while (i < safe.length) {
      // Render in small chunks to keep it smooth and fast
      const step = i < 120 ? 1 : i < 400 ? 2 : 3;
      el.textContent = safe.slice(0, i + step);
      i += step;
      // Keep scroll pinned while typing
      scrollBottom();
      await new Promise(r => setTimeout(r, delayMs));
    }
  }

  function escapeAttr(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/"/g, "&quot;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function createNewChat() {
    const id = "chat-" + Date.now();
    activeChatId = id;
    chats.unshift({
      id,
      title: "Bisedë e re",
      createdAt: Date.now(),
      updatedAt: Date.now(),
      messages: [],
    });
  }

  function ensureActiveChat() {
    if (!activeChatId || !chats.some(c => c.id === activeChatId)) {
      if (!chats.length) createNewChat();
      activeChatId = chats[0].id;
    }
  }

  function upsertChatMessage(message) {
    ensureActiveChat();
    const chat = chats.find(c => c.id === activeChatId);
    if (!chat) return;
    chat.messages.push(message);
    chat.updatedAt = Date.now();
    if (chat.title === "Bisedë e re" && message.role === "user" && message.text) {
      chat.title = message.text.slice(0, 48);
    }
    // keep latest active chat on top
    chats.sort((a, b) => b.updatedAt - a.updatedAt);
    persistHistory();
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById("history-list");
    if (!list) return;
    list.innerHTML = "";
    chats.slice(0, 25).forEach(chat => {
      const btn = document.createElement("button");
      btn.className = "history-item glass-btn" + (chat.id === activeChatId ? " active" : "");
      btn.title = chat.title;
      const preview = chat.messages.find(m => m.role === "assistant" && m.text)?.text
        || chat.messages.find(m => m.role === "user" && m.text)?.text
        || "Bisedë e re";
      btn.innerHTML = `
        <span class="history-title">${escapeHtml(chat.title)}</span>
        <span class="history-sub">${escapeHtml(preview.slice(0, 52))}</span>`;
      btn.onclick = () => loadChat(chat.id);
      list.appendChild(btn);
    });
  }

  function loadChat(chatId) {
    const chat = chats.find(c => c.id === chatId);
    if (!chat) return;
    activeChatId = chatId;
    const messages = document.getElementById("messages-inner");
    messages.innerHTML = "";
    if (!chat.messages.length) {
      messages.innerHTML = `
        <div class="empty-state" id="empty-state">
          <h1>LIGJBOT</h1>
          <p>Asistenti juridik i qytetarit shqiptar. Pyet mbi të drejtat, gjobat, policinë dhe ligjet.</p>
          <div class="starter-grid" id="starter-grid"></div>
        </div>`;
      const grid = document.getElementById("starter-grid");
      suggestionQuestions.slice(0, 4).forEach((q) => {
        const card = document.createElement("button");
        card.className = "starter-card glass-card";
        card.textContent = q;
        card.onclick = () => submitQuestion(q);
        grid.appendChild(card);
      });
      renderHistory();
      closeSidebar();
      return;
    }
    chat.messages.forEach(msg => {
      if (msg.role === "user") {
        renderStoredUser(msg.text || "");
      } else if (msg.error) {
        renderStoredError(msg.error);
      } else {
        renderStoredAssistant(msg);
      }
    });
    renderHistory();
    scrollBottom();
    closeSidebar();
  }

  function renderStoredUser(text) {
    const messages = document.getElementById("messages-inner");
    const row = document.createElement("div");
    row.className = "message-row";
    row.innerHTML = `
      <div class="avatar user">U</div>
      <div class="message-content">
        <div class="message-author">Ju</div>
        <div class="message-text user-text">${escapeHtml(text)}</div>
      </div>`;
    messages.appendChild(row);
  }

  function renderStoredAssistant(msg) {
    const messages = document.getElementById("messages-inner");
    const row = document.createElement("div");
    row.className = "message-row bot-row";
    let sourcesHtml = "";
    if (msg.sources && msg.sources.length > 0) {
      const chips = msg.sources.map(s => {
        const label = escapeHtml(s.label || "");
        const page = s.page ? `Faqe ${s.page}` : "";
        const title = [label, page].filter(Boolean).join(" · ");
        if (s.url) {
          return `<a class="source-chip" href="${escapeAttr(s.url)}" target="_blank" title="${escapeAttr(title)}">📌 ${label}${page ? ` <span style="opacity:.65">· ${page}</span>` : ""}</a>`;
        }
        return `<span class="source-chip">📌 ${escapeHtml(title)}</span>`;
      }).join("");
      sourcesHtml = `<div class="sources-block"><span class="sources-label">Burimet ligjore</span>${chips}</div>`;
    }
    row.innerHTML = `
      <div class="avatar bot">${botLogoImg()}</div>
      <div class="message-content">
        <div class="message-author">LIGJBOT</div>
        <div class="message-text">${escapeHtml(msg.text || "")}</div>
        <div class="meta-row">
          ${msg.responseMs ? `<span class="meta-chip">⚡ ${msg.responseMs}ms</span>` : ""}
          ${msg.cached ? `<span class="meta-chip">Cache</span>` : ""}
        </div>
        ${sourcesHtml}
      </div>`;
    messages.appendChild(row);
  }

  function renderStoredError(errorText) {
    const messages = document.getElementById("messages-inner");
    const row = document.createElement("div");
    row.className = "message-row bot-row";
    row.innerHTML = `
      <div class="avatar bot">${botLogoImg()}</div>
      <div class="message-content">
        <div class="message-author">LIGJBOT</div>
        <div class="error-msg">⚠️ ${escapeHtml(errorText)}</div>
      </div>`;
    messages.appendChild(row);
  }

  function persistHistory() {
    try {
      localStorage.setItem(HISTORY_KEY, JSON.stringify({ activeChatId, chats }));
    } catch (e) {}
  }

  function loadHistory() {
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (!raw) {
        createNewChat();
        return;
      }
      const parsed = JSON.parse(raw);
      chats = Array.isArray(parsed.chats) ? parsed.chats : [];
      activeChatId = parsed.activeChatId || null;
      if (!chats.length) createNewChat();
    } catch (e) {
      chats = [];
      createNewChat();
    }
  }

  // ── Textarea auto-resize ──────────────────────────────────
  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 160) + "px";
  }

  const textarea = document.getElementById("user-input");

  textarea.addEventListener("input", function () { autoResize(this); });

  textarea.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  textarea.addEventListener("focus", () => {
    setTimeout(() => scrollBottom(), 280);
  });

  setupMobileKeyboard();
  setupSidebarSwipe();
  init();
</script>
</body>
</html>
