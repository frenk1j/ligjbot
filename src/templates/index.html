<!DOCTYPE html>
<html lang="sq" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#060b16" id="theme-color-meta"/>
<title>LIGJBOT — Asistenti Juridik</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:        #c9a227;
    --gold-soft:   #e4c76b;
    --red:         #9b2c2c;
    --sidebar-w:   280px;
    --radius:      8px;
    --radius-lg:   12px;
    --max-w:       700px;
  }

  /* Light mode */
  [data-theme="light"] {
    --navy:        #0f1d3d;
    --navy-dark:   #0a1428;
    --navy-mid:    #1a3058;
    --bg:          #f3f4f6;
    --bg-sub:      #ffffff;
    --bg-input:    #ffffff;
    --border:      #d8dde8;
    --border-soft: #e8ecf3;
    --text:        #1a2332;
    --text-muted:  #5f6b7c;
    --text-light:  #3d4a5c;
    --heading:     #0f1d3d;
    --user-bubble: #eef1f7;
    --error-bg:    #fef2f2;
    --error-border:#fecaca;
    --sidebar-bg:  #0f1d3d;
    --sidebar-text:#e8ecf3;
    --btn-primary: #0f1d3d;
    --btn-primary-hover: #1a3058;
    --watermark-opacity: 0.22;
  }

  /* Dark mode */
  [data-theme="dark"] {
    --navy:        #1e3a6e;
    --navy-dark:   #0a1224;
    --navy-mid:    #2a4f8f;
    --bg:          #0b1018;
    --bg-sub:      #121a28;
    --bg-input:    #121a28;
    --border:      #2a3548;
    --border-soft: #1a2436;
    --text:        #e8edf5;
    --text-muted:  #94a3b8;
    --text-light:  #b8c5d6;
    --heading:     #f0d78c;
    --user-bubble: #162033;
    --error-bg:    rgba(155,44,44,.2);
    --error-border:#9b2c2c;
    --sidebar-bg:  #070d16;
    --sidebar-text:#e8edf5;
    --btn-primary: #c9a227;
    --btn-primary-hover: #e4c76b;
    --watermark-opacity: 0.34;
  }

  html {
    height: 100%;
    /* prevent rubber-band scroll on iOS */
    overscroll-behavior: none;
  }

  body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    overscroll-behavior: none;
    /* iOS safe areas */
    padding-left:   env(safe-area-inset-left);
    padding-right:  env(safe-area-inset-right);
    transition: background .2s, color .2s;
  }

  .app {
    display: flex;
    /* 100dvh handles the mobile browser address bar correctly */
    height: 100dvh;
    height: 100vh; /* fallback */
    overflow: hidden;
  }

  /* ── Sidebar overlay (mobile) ───────────────────────────── */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 99;
  }
  .sidebar-overlay.open { display: block; }

  /* ── Sidebar ─────────────────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
    -webkit-overflow-scrolling: touch;
    transition: width .25s ease, min-width .25s ease, transform .25s ease, opacity .2s ease;
    padding-left: env(safe-area-inset-left);
    border-right: 1px solid rgba(255,255,255,.06);
  }

  .app.sidebar-collapsed .sidebar {
    width: 0;
    min-width: 0;
    opacity: 0;
    pointer-events: none;
    border-right: none;
  }

  .sidebar-header {
    padding: 20px 16px 16px;
    border-bottom: 1px solid rgba(255,255,255,.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 15px;
    color: var(--sidebar-text);
    min-width: 0;
  }

  .sidebar-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 2px solid var(--gold);
    box-shadow: 0 0 12px rgba(201,162,39,.25);
    overflow: hidden;
  }
  .logo-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: inherit;
    display: block;
  }

  .sidebar-close {
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.12);
    color: rgba(255,255,255,.7);
    font-size: 18px;
    cursor: pointer;
    padding: 6px 8px;
    line-height: 1;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .sidebar-close:hover { background: rgba(255,255,255,.14); color: #fff; }

  .new-chat-btn {
    display: flex; align-items: center; gap: 8px;
    margin: 12px 12px 10px;
    padding: 10px 12px;
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,.15);
    background: rgba(255,255,255,.06);
    color: rgba(255,255,255,.85);
    cursor: pointer; font-size: 13px;
    width: calc(100% - 24px);
    text-align: left;
    transition: background .15s;
    font-family: inherit;
    /* touch target */
    min-height: 44px;
  }
  .new-chat-btn:hover { background: rgba(255,255,255,.12); }

  .sidebar-section {
    font-size: 10px; font-weight: 600;
    color: rgba(255,255,255,.35);
    text-transform: uppercase; letter-spacing: .07em;
    padding: 8px 16px 8px;
  }

  .history-list {
    padding: 0 10px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow-y: auto;
    flex: 1;
    -webkit-overflow-scrolling: touch;
  }

  .history-item {
    width: 100%;
    text-align: left;
    border: 1px solid transparent;
    background: transparent;
    color: rgba(255,255,255,.82);
    border-radius: 10px;
    padding: 10px 10px;
    cursor: pointer;
    font-size: 13px;
    line-height: 1.35;
    min-height: 48px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    flex-direction: column;
    transition: background .15s, border-color .15s, color .15s;
  }
  .history-item:hover {
    background: rgba(255,255,255,.08);
    color: #fff;
  }
  .history-item.active {
    background: rgba(255,255,255,.12);
    border-color: rgba(255,255,255,.18);
    color: #fff;
  }
  .history-title {
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
  }
  .history-sub {
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 11px;
    opacity: .65;
    margin-top: 2px;
  }

  .suggestion-btn {
    display: block; width: 100%;
    text-align: left; background: none; border: none;
    color: rgba(255,255,255,.55); font-size: 13px;
    padding: 9px 16px;
    cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: background .15s, color .15s;
    font-family: inherit;
    min-height: 44px;
    display: flex; align-items: center;
  }
  .suggestion-btn:hover, .suggestion-btn:active {
    background: rgba(255,255,255,.07);
    color: rgba(255,255,255,.9);
  }

  /* ── Main ────────────────────────────────────────────────── */
  .main {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden; background: var(--bg);
    transition: background .2s;
    min-width: 0;
  }

  /* ── Topbar ──────────────────────────────────────────────── */
  .topbar {
    padding: 0 16px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0; background: var(--bg);
    transition: background .2s, border-color .2s;
    /* iOS safe area top */
    padding-top: env(safe-area-inset-top);
    height: calc(52px + env(safe-area-inset-top));
  }

  .sidebar-toggle-btn {
    display: flex;
    background: var(--bg-sub);
    border: 1px solid var(--border);
    color: var(--text-light);
    font-size: 18px;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 8px;
    line-height: 1;
    min-width: 40px;
    min-height: 40px;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-family: inherit;
  }
  .hamburger-btn { display: none; }
  .sidebar-toggle-btn:hover { background: var(--border-soft); border-color: var(--gold); }

  .topbar-logo {
    display: flex; align-items: center; gap: 8px;
    font-size: 15px; font-weight: 600; color: var(--heading);
    transition: color .2s;
  }
  .topbar-divider {
    width: 1px; height: 18px; background: var(--border); margin: 0 2px;
    transition: background .2s;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-muted); transition: background .3s; flex-shrink: 0;
  }
  .status-dot.ready   { background: #2d8a50; }
  .status-dot.error   { background: var(--red); }
  .status-dot.loading { background: #e8a020; animation: pulse 1.2s infinite; }

  .topbar-label {
    font-size: 13px; color: var(--text-light); transition: color .2s;
    flex: 1;
  }

  /* Theme toggle button */
  .theme-btn {
    margin-left: auto;
    background: none; border: 1px solid var(--border);
    color: var(--text-light); border-radius: 8px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px;
    transition: background .15s, border-color .15s, color .15s;
    flex-shrink: 0;
  }
  .theme-btn:hover { background: var(--bg-sub); border-color: var(--gold); color: var(--heading); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Messages ────────────────────────────────────────────── */
  .messages {
    flex: 1; overflow-y: auto; padding: 0 0 24px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    position: relative;
    isolation: isolate;
  }

  .chat-watermark {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .chat-watermark img {
    width: min(560px, 82vw);
    max-height: 82vh;
    object-fit: contain;
    filter: blur(14px) saturate(1.15);
    opacity: var(--watermark-opacity);
  }

  .messages-inner {
    position: relative;
    z-index: 1;
    min-height: 100%;
  }

  .message-row,
  .empty-state {
    position: relative;
  }
  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Empty state */
  .empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100%; gap: 14px; padding: 32px 24px; text-align: center;
  }
  .empty-state h1 {
    font-size: 26px; font-weight: 700; color: var(--heading);
    letter-spacing: -.02em;
  }
  .empty-state p  { color: var(--text-muted); max-width: 420px; font-size: 14px; line-height: 1.55; }

  .starter-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 8px; max-width: 500px; width: 100%; margin-top: 8px;
  }
  .starter-card {
    background: var(--bg-sub); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
    cursor: pointer; font-size: 13px; color: var(--text);
    text-align: left; transition: border-color .15s, background .15s, box-shadow .15s;
    line-height: 1.4; font-family: inherit;
    min-height: 44px;
  }
  .starter-card:hover, .starter-card:active {
    border-color: var(--gold); background: var(--bg-sub);
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }

  /* Message row */
  .message-row {
    display: flex; padding: 16px 20px; gap: 12px;
    max-width: calc(var(--max-w) + 80px);
    margin: 0 auto; width: 100%;
  }
  .message-row.bot-row { border-top: 1px solid var(--border-soft); transition: border-color .2s; }

  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0; margin-top: 3px; font-weight: 600;
  }
  .avatar.user { background: var(--btn-primary); color: #fff; }
  .avatar.bot  {
    background: var(--bg-sub);
    color: var(--gold);
    font-size: 11px;
    font-weight: 700;
    border: 1px solid var(--gold);
  }

  .message-content { flex: 1; min-width: 0; }
  .message-author {
    font-size: 11px; font-weight: 600; margin-bottom: 4px;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em;
    transition: color .2s;
  }
  .meta-row {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .meta-chip {
    font-size: 11px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    background: var(--bg-sub);
    border-radius: 999px;
    padding: 2px 8px;
  }
  .message-text {
    color: var(--text); white-space: pre-wrap; word-break: break-word;
    font-size: 15px; transition: color .2s;
  }
  .message-text.user-text {
    background: var(--user-bubble); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 10px 14px;
    display: inline-block; max-width: 100%;
    transition: background .2s, border-color .2s;
  }

  /* Sources */
  .sources-block {
    margin-top: 12px; display: flex; flex-wrap: wrap;
    gap: 6px; align-items: center;
  }
  .sources-label {
    font-size: 10px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: .06em;
    width: 100%; margin-bottom: 2px; transition: color .2s;
  }
  .source-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--bg-sub); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 11px;
    font-size: 12px; color: var(--heading); text-decoration: none;
    transition: background .15s, border-color .15s, color .15s;
    cursor: pointer; white-space: nowrap;
    /* touch-friendly */
    min-height: 32px;
  }
  .source-chip:hover, .source-chip:active {
    background: var(--btn-primary); color: #fff; border-color: var(--btn-primary);
  }

  /* Typing */
  .typing-dots { display: flex; gap: 4px; padding: 4px 0; }
  .typing-dots span {
    width: 6px; height: 6px; background: var(--text-muted);
    border-radius: 50%; animation: dot-bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes dot-bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

  /* Error */
  .error-msg {
    color: var(--red); background: var(--error-bg);
    border: 1px solid var(--error-border);
    border-radius: var(--radius); padding: 10px 14px; font-size: 14px;
    transition: background .2s, border-color .2s;
  }

  /* ── Input area ──────────────────────────────────────────── */
  .input-area {
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    flex-shrink: 0; background: var(--bg);
    border-top: 1px solid var(--border);
    transition: background .2s, border-color .2s;
  }
  .input-wrapper {
    max-width: var(--max-w); margin: 0 auto;
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    display: flex; align-items: flex-end; gap: 8px; padding: 9px 10px;
    transition: border-color .2s, box-shadow .2s, background .2s;
  }
  .input-wrapper:focus-within {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,162,39,.15);
  }
  #user-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-size: 16px; /* 16px prevents iOS zoom */
    resize: none; max-height: 160px; line-height: 1.5; font-family: inherit;
    transition: color .2s;
  }
  #user-input::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 36px; height: 36px; border-radius: 6px; border: none;
    background: var(--btn-primary); color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 15px;
    transition: background .15s, opacity .15s;
    /* touch-friendly */
    min-width: 36px;
  }
  .send-btn:hover    { background: var(--btn-primary-hover); }
  .send-btn:disabled { opacity: .35; cursor: not-allowed; }

  .input-footer {
    text-align: center; font-size: 11px; color: var(--text-muted);
    margin-top: 7px; max-width: var(--max-w);
    margin-left: auto; margin-right: auto;
    transition: color .2s;
  }

  /* ── Mobile ──────────────────────────────────────────────── */
  @media (max-width: 640px) {
    .sidebar {
      position: fixed; inset: 0; right: auto;
      width: min(var(--sidebar-w), 85vw);
      min-width: min(var(--sidebar-w), 85vw);
      z-index: 100;
      transform: translateX(-100%);
      opacity: 1;
      pointer-events: auto;
      padding-top: env(safe-area-inset-top);
      padding-left: env(safe-area-inset-left);
    }
    .app.sidebar-collapsed .sidebar {
      width: min(var(--sidebar-w), 85vw);
      min-width: min(var(--sidebar-w), 85vw);
      transform: translateX(-100%);
      opacity: 1;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-toggle-btn { display: none; }
    .hamburger-btn { display: flex; }
    .starter-grid        { grid-template-columns: 1fr; }
    .message-row         { padding: 12px 14px; }
    .empty-state         { padding: 24px 16px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Mobile sidebar overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebarMobile()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-icon"><img class="logo-img" src="/static/ligjbot-logo.png" alt="LigjBot logo"/></div>
        LIGJBOT
      </div>
      <button class="sidebar-close" onclick="collapseSidebar()" aria-label="Mbyll sidebar">✕</button>
    </div>
    <button class="new-chat-btn" onclick="newChat(); collapseSidebar();">✏️ &nbsp;Bisedë e re</button>
    <div class="sidebar-section">Chats</div>
    <div class="history-list" id="history-list"></div>
  </aside>

  <!-- Main panel -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <button type="button" class="sidebar-toggle-btn" id="sidebar-toggle" onclick="toggleSidebarDesktop()" aria-label="Hap/mbyll sidebar">☰</button>
      <button type="button" class="hamburger-btn" onclick="openSidebarMobile()" aria-label="Menu">☰</button>
      <div class="topbar-logo">
        <span>LIGJBOT</span>
      </div>
      <div class="topbar-divider"></div>
      <div class="status-dot loading" id="status-dot"></div>
      <span class="topbar-label" id="topbar-label">Duke u ngarkuar…</span>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" aria-label="Ndrysho temën">🌙</button>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="chat-watermark" aria-hidden="true">
        <img src="/static/ligjbot-logo.png" alt="">
      </div>
      <div class="messages-inner" id="messages-inner">
        <div class="empty-state" id="empty-state">
          <h1>LIGJBOT</h1>
          <p>Asistenti juridik i qytetarit shqiptar. Pyet mbi të drejtat, gjobat, policinë dhe ligjet.</p>
          <div class="starter-grid" id="starter-grid"></div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="user-input"
          rows="1"
          placeholder="Shkruaj pyetjen tënde ligjore…"
          disabled
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled title="Dërgo">↑</button>
      </div>
      <div class="input-footer">
        LIGJBOT mund të bëjë gabime. Për situata serioze konsultohuni me avokat.
      </div>
    </div>

  </div>
</div>

<script>
  let isLoading = false;
  let activeChatId = null;
  let chats = [];
  let suggestionQuestions = [];
  const HISTORY_KEY = "LIGJBOT-history";

  // ── Theme ─────────────────────────────────────────────────
  const THEME_KEY = "LIGJBOT-theme";

  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    const btn  = document.getElementById("theme-btn");
    const meta = document.getElementById("theme-color-meta");
    if (theme === "dark") {
      btn.textContent  = "☀️";
      btn.title        = "Modalitet i ndritshëm";
      meta.content     = "#0b1018";
    } else {
      btn.textContent  = "🌙";
      btn.title        = "Modalitet i errët";
      meta.content     = "#f3f4f6";
    }
  }

  function toggleTheme() {
    const current = document.documentElement.getAttribute("data-theme");
    const next    = current === "dark" ? "light" : "dark";
    applyTheme(next);
    localStorage.setItem(THEME_KEY, next);
  }

  // Apply saved theme immediately (prevents flash)
  (function () {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved) applyTheme(saved);
    else if (window.matchMedia("(prefers-color-scheme: dark)").matches) applyTheme("dark");
  })();

  const SIDEBAR_KEY = "LIGJBOT-sidebar-collapsed";

  function isMobile() {
    return window.innerWidth <= 640;
  }

  function setSidebarCollapsed(collapsed) {
    document.querySelector(".app").classList.toggle("sidebar-collapsed", collapsed);
    if (!isMobile()) {
      localStorage.setItem(SIDEBAR_KEY, collapsed ? "1" : "0");
    }
  }

  function toggleSidebarDesktop() {
    if (isMobile()) return;
    const app = document.querySelector(".app");
    setSidebarCollapsed(!app.classList.contains("sidebar-collapsed"));
  }

  function collapseSidebar() {
    if (isMobile()) {
      closeSidebarMobile();
    } else {
      setSidebarCollapsed(true);
    }
  }

  function openSidebarMobile() {
    if (!isMobile()) {
      setSidebarCollapsed(false);
      return;
    }
    document.getElementById("sidebar").classList.add("open");
    document.getElementById("sidebar-overlay").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeSidebarMobile() {
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("sidebar-overlay").classList.remove("open");
    document.body.style.overflow = "";
  }

  function closeSidebar() {
    collapseSidebar();
  }

  (function initSidebarState() {
    if (!isMobile() && localStorage.getItem(SIDEBAR_KEY) === "1") {
      setSidebarCollapsed(true);
    }
    window.addEventListener("resize", () => {
      if (!isMobile()) closeSidebarMobile();
    });
  })();

  // ── Init ──────────────────────────────────────────────────
  async function init() {
    loadHistory();
    await loadSuggestions();
    await pollStatus();
    ensureActiveChat();
    renderHistory();
  }

  async function loadSuggestions() {
    try {
      const res  = await fetch("/api/suggestions");
      const list = await res.json();
      suggestionQuestions = Array.isArray(list) ? list : [];

      const sidebar = document.getElementById("sidebar-suggestions");
      if (sidebar) {
        list.forEach(q => {
          const btn = document.createElement("button");
          btn.className   = "suggestion-btn";
          btn.textContent = q;
          btn.title       = q;
          btn.onclick     = () => { submitQuestion(q); closeSidebar(); };
          sidebar.appendChild(btn);
        });
      }

      const grid = document.getElementById("starter-grid");
      suggestionQuestions.slice(0, 4).forEach(q => {
        const card = document.createElement("button");
        card.className   = "starter-card";
        card.textContent = q;
        card.onclick     = () => submitQuestion(q);
        grid.appendChild(card);
      });
    } catch (e) { console.error(e); }
  }

  async function pollStatus() {
    try {
      const res  = await fetch("/api/status");
      const data = await res.json();
      const dot   = document.getElementById("status-dot");
      const label = document.getElementById("topbar-label");
      const input = document.getElementById("user-input");
      const btn   = document.getElementById("send-btn");

      if (data.ready) {
        dot.className     = "status-dot ready";
        label.textContent = "Gati";
        input.disabled    = false;
        btn.disabled      = false;
      } else if (data.error) {
        dot.className     = "status-dot error";
        label.textContent = "Gabim: " + data.error;
      } else {
        setTimeout(pollStatus, 2000);
      }
    } catch (e) {
      setTimeout(pollStatus, 3000);
    }
  }

  // ── New chat ──────────────────────────────────────────────
  function newChat() {
    createNewChat();
    const messages = document.getElementById("messages-inner");
    messages.innerHTML = `
      <div class="empty-state" id="empty-state">
        <h1>LIGJBOT</h1>
        <p>Asistenti juridik i qytetarit shqiptar. Pyet mbi të drejtat, gjobat, policinë dhe ligjet.</p>
        <div class="starter-grid" id="starter-grid"></div>
      </div>`;

    const grid = document.getElementById("starter-grid");
    suggestionQuestions.slice(0, 4).forEach((q) => {
      const card = document.createElement("button");
      card.className   = "starter-card";
      card.textContent = q;
      card.onclick     = () => submitQuestion(q);
      grid.appendChild(card);
    });
    persistHistory();
    renderHistory();
  }

  // ── Send ──────────────────────────────────────────────────
  function sendMessage() {
    const input = document.getElementById("user-input");
    const text  = input.value.trim();
    if (!text || isLoading) return;
    input.value = "";
    autoResize(input);
    submitQuestion(text);
  }

  async function submitQuestion(question) {
    if (isLoading) return;

    const emptyState = document.getElementById("empty-state");
    if (emptyState) emptyState.remove();

    appendMessage("user", question);
    const typingId = appendTyping();

    isLoading = true;
    document.getElementById("send-btn").disabled = true;

    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 45000);
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: question }),
        signal: controller.signal,
      });
      clearTimeout(timeoutId);

      removeTyping(typingId);
      const data = await res.json();

      if (!res.ok || data.error) {
        appendError(data.error || "Gabim i panjohur.");
      } else {
        await appendBotMessage(data.answer, data.sources, data.response_ms, data.cached);
      }
    } catch (err) {
      removeTyping(typingId);
      if (err.name === "AbortError") {
        appendError("Pergjigjja po vonon. Provo nje pyetje me te shkurter ose dergo perseri.");
      } else {
        appendError("Gabim rrjeti: " + err.message);
      }
    } finally {
      isLoading = false;
      document.getElementById("send-btn").disabled = false;
    }
  }

  // ── DOM helpers ───────────────────────────────────────────
  function appendMessage(role, text) {
    const messages = document.getElementById("messages-inner");
    const row      = document.createElement("div");
    const isUser   = role === "user";
    row.className  = "message-row" + (isUser ? "" : " bot-row");
    row.innerHTML  = `
      <div class="avatar ${isUser ? "user" : "bot"}">${isUser ? "U" : '<img class="logo-img" src="/static/ligjbot-logo.png" alt="LIGJBOT logo"/>'}</div>
      <div class="message-content">
        <div class="message-author">${isUser ? "Ju" : "LIGJBOT"}</div>
        <div class="message-text ${isUser ? "user-text" : ""}">${escapeHtml(text)}</div>
      </div>`;
    messages.appendChild(row);
    scrollBottom();
    upsertChatMessage({
      role,
      text,
    });
  }

  async function appendBotMessage(answer, sources, responseMs, cached) {
    const messages = document.getElementById("messages-inner");
    const row      = document.createElement("div");
    row.className  = "message-row bot-row";

    let sourcesHtml = "";
    if (sources && sources.length > 0) {
      const chips = sources.map(s => {
        const label = escapeHtml(s.label);
        const page  = s.page ? `Faqe ${s.page}` : "";
        const title = [label, page].filter(Boolean).join(" · ");
        if (s.url) {
          return `<a class="source-chip" href="${escapeHtml(s.url)}" target="_blank" title="${title}">📌 ${label}${page ? ` <span style="opacity:.65">· ${page}</span>` : ""}</a>`;
        }
        return `<span class="source-chip">📌 ${title}</span>`;
      }).join("");
      sourcesHtml = `<div class="sources-block"><span class="sources-label">Burimet ligjore</span>${chips}</div>`;
    }

    const metaChips = `
      <div class="meta-row">
        ${responseMs ? `<span class="meta-chip">⚡ ${responseMs}ms</span>` : ""}
        ${cached ? `<span class="meta-chip">Cache</span>` : ""}
      </div>`;

    row.innerHTML = `
      <div class="avatar bot"><img class="logo-img" src="/static/ligjbot-logo.png" alt="LIGJBOT logo"/></div>
      <div class="message-content">
        <div class="message-author">LIGJBOT</div>
        <div class="message-text" id="assistant-text-${Date.now()}"></div>
        ${metaChips}
        ${sourcesHtml}
      </div>`;
    messages.appendChild(row);
    const textEl = row.querySelector(".message-text");
    await typeText(textEl, answer, 8);
    scrollBottom();
    upsertChatMessage({
      role: "assistant",
      text: answer,
      sources: sources || [],
      responseMs: responseMs || null,
      cached: !!cached,
    });
  }

  function appendTyping() {
    const messages = document.getElementById("messages-inner");
    const row      = document.createElement("div");
    row.className  = "message-row bot-row";
    const id       = "typing-" + Date.now();
    row.id         = id;
    row.innerHTML  = `
      <div class="avatar bot"><img class="logo-img" src="/static/ligjbot-logo.png" alt="LIGJBOT logo"/></div>
      <div class="message-content">
        <div class="message-author">LIGJBOT</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>`;
    messages.appendChild(row);
    scrollBottom();
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function appendError(msg) {
    const messages = document.getElementById("messages-inner");
    const row      = document.createElement("div");
    row.className  = "message-row bot-row";
    row.innerHTML  = `
      <div class="avatar bot"><img class="logo-img" src="/static/ligjbot-logo.png" alt="LIGJBOT logo"/></div>
      <div class="message-content">
        <div class="message-author">LIGJBOT</div>
        <div class="error-msg">⚠️ ${escapeHtml(msg)}</div>
      </div>`;
    messages.appendChild(row);
    scrollBottom();
    upsertChatMessage({
      role: "assistant",
      error: msg,
    });
  }

  function scrollBottom() {
    const m = document.getElementById("messages");
    m.scrollTop = m.scrollHeight;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  async function typeText(el, text, delayMs = 8) {
    const safe = String(text || "");
    if (!safe.length) {
      el.textContent = "";
      return;
    }
    let i = 0;
    while (i < safe.length) {
      // Render in small chunks to keep it smooth and fast
      const step = i < 120 ? 1 : i < 400 ? 2 : 3;
      el.textContent = safe.slice(0, i + step);
      i += step;
      // Keep scroll pinned while typing
      scrollBottom();
      await new Promise(r => setTimeout(r, delayMs));
    }
  }

  function escapeAttr(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/"/g, "&quot;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function createNewChat() {
    const id = "chat-" + Date.now();
    activeChatId = id;
    chats.unshift({
      id,
      title: "Bisedë e re",
      createdAt: Date.now(),
      updatedAt: Date.now(),
      messages: [],
    });
  }

  function ensureActiveChat() {
    if (!activeChatId || !chats.some(c => c.id === activeChatId)) {
      if (!chats.length) createNewChat();
      activeChatId = chats[0].id;
    }
  }

  function upsertChatMessage(message) {
    ensureActiveChat();
    const chat = chats.find(c => c.id === activeChatId);
    if (!chat) return;
    chat.messages.push(message);
    chat.updatedAt = Date.now();
    if (chat.title === "Bisedë e re" && message.role === "user" && message.text) {
      chat.title = message.text.slice(0, 48);
    }
    // keep latest active chat on top
    chats.sort((a, b) => b.updatedAt - a.updatedAt);
    persistHistory();
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById("history-list");
    if (!list) return;
    list.innerHTML = "";
    chats.slice(0, 25).forEach(chat => {
      const btn = document.createElement("button");
      btn.className = "history-item" + (chat.id === activeChatId ? " active" : "");
      btn.title = chat.title;
      const preview = chat.messages.find(m => m.role === "assistant" && m.text)?.text
        || chat.messages.find(m => m.role === "user" && m.text)?.text
        || "Bisedë e re";
      btn.innerHTML = `
        <span class="history-title">${escapeHtml(chat.title)}</span>
        <span class="history-sub">${escapeHtml(preview.slice(0, 52))}</span>`;
      btn.onclick = () => loadChat(chat.id);
      list.appendChild(btn);
    });
  }

  function loadChat(chatId) {
    const chat = chats.find(c => c.id === chatId);
    if (!chat) return;
    activeChatId = chatId;
    const messages = document.getElementById("messages-inner");
    messages.innerHTML = "";
    if (!chat.messages.length) {
      messages.innerHTML = `
        <div class="empty-state" id="empty-state">
          <h1>LIGJBOT</h1>
          <p>Asistenti juridik i qytetarit shqiptar. Pyet mbi të drejtat, gjobat, policinë dhe ligjet.</p>
          <div class="starter-grid" id="starter-grid"></div>
        </div>`;
      const grid = document.getElementById("starter-grid");
      suggestionQuestions.slice(0, 4).forEach((q) => {
        const card = document.createElement("button");
        card.className = "starter-card";
        card.textContent = q;
        card.onclick = () => submitQuestion(q);
        grid.appendChild(card);
      });
      renderHistory();
      closeSidebar();
      return;
    }
    chat.messages.forEach(msg => {
      if (msg.role === "user") {
        renderStoredUser(msg.text || "");
      } else if (msg.error) {
        renderStoredError(msg.error);
      } else {
        renderStoredAssistant(msg);
      }
    });
    renderHistory();
    scrollBottom();
    closeSidebar();
  }

  function renderStoredUser(text) {
    const messages = document.getElementById("messages-inner");
    const row = document.createElement("div");
    row.className = "message-row";
    row.innerHTML = `
      <div class="avatar user">U</div>
      <div class="message-content">
        <div class="message-author">Ju</div>
        <div class="message-text user-text">${escapeHtml(text)}</div>
      </div>`;
    messages.appendChild(row);
  }

  function renderStoredAssistant(msg) {
    const messages = document.getElementById("messages-inner");
    const row = document.createElement("div");
    row.className = "message-row bot-row";
    let sourcesHtml = "";
    if (msg.sources && msg.sources.length > 0) {
      const chips = msg.sources.map(s => {
        const label = escapeHtml(s.label || "");
        const page = s.page ? `Faqe ${s.page}` : "";
        const title = [label, page].filter(Boolean).join(" · ");
        if (s.url) {
          return `<a class="source-chip" href="${escapeAttr(s.url)}" target="_blank" title="${escapeAttr(title)}">📌 ${label}${page ? ` <span style="opacity:.65">· ${page}</span>` : ""}</a>`;
        }
        return `<span class="source-chip">📌 ${escapeHtml(title)}</span>`;
      }).join("");
      sourcesHtml = `<div class="sources-block"><span class="sources-label">Burimet ligjore</span>${chips}</div>`;
    }
    row.innerHTML = `
      <div class="avatar bot"><img class="logo-img" src="/static/ligjbot-logo.png" alt="LIGJBOT logo"/></div>
      <div class="message-content">
        <div class="message-author">LIGJBOT</div>
        <div class="message-text">${escapeHtml(msg.text || "")}</div>
        <div class="meta-row">
          ${msg.responseMs ? `<span class="meta-chip">⚡ ${msg.responseMs}ms</span>` : ""}
          ${msg.cached ? `<span class="meta-chip">Cache</span>` : ""}
        </div>
        ${sourcesHtml}
      </div>`;
    messages.appendChild(row);
  }

  function renderStoredError(errorText) {
    const messages = document.getElementById("messages-inner");
    const row = document.createElement("div");
    row.className = "message-row bot-row";
    row.innerHTML = `
      <div class="avatar bot"><img class="logo-img" src="/static/ligjbot-logo.png" alt="LIGJBOT logo"/></div>
      <div class="message-content">
        <div class="message-author">LIGJBOT</div>
        <div class="error-msg">⚠️ ${escapeHtml(errorText)}</div>
      </div>`;
    messages.appendChild(row);
  }

  function persistHistory() {
    try {
      localStorage.setItem(HISTORY_KEY, JSON.stringify({ activeChatId, chats }));
    } catch (e) {}
  }

  function loadHistory() {
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (!raw) {
        createNewChat();
        return;
      }
      const parsed = JSON.parse(raw);
      chats = Array.isArray(parsed.chats) ? parsed.chats : [];
      activeChatId = parsed.activeChatId || null;
      if (!chats.length) createNewChat();
    } catch (e) {
      chats = [];
      createNewChat();
    }
  }

  // ── Textarea auto-resize ──────────────────────────────────
  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 160) + "px";
  }

  const textarea = document.getElementById("user-input");

  textarea.addEventListener("input", function () { autoResize(this); });

  textarea.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // iOS: scroll to bottom when keyboard appears so input stays visible
  textarea.addEventListener("focus", () => {
    setTimeout(() => scrollBottom(), 300);
  });

  init();
</script>
</body>
