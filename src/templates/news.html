<!DOCTYPE html>
<html lang="sq" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#060b16" id="theme-color-meta"/>
<link rel="manifest" href="/manifest.webmanifest"/>
<link rel="apple-touch-icon" href="/static/ligjbot-logo.png"/>
<link rel="icon" type="image/png" href="/static/ligjbot-logo.png"/>
<title>Lajme Rrugore — LIGJBOT</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a227; --gold-soft: #e4c76b;
    --radius: 8px; --radius-lg: 12px; --radius-xl: 20px;
    --glass-btn-bg: rgba(255,255,255,.1);
    --glass-btn-hover: rgba(255,255,255,.18);
    --glass-btn-border: rgba(255,255,255,.25);
  }

  [data-theme="dark"] {
    --bg: #0b1018; --bg-sub: #121a28;
    --border: #2a3548; --border-soft: #1a2436;
    --text: #e8edf5; --text-muted: #94a3b8;
    --heading: #f0d78c;
  }
  [data-theme="light"] {
    --bg: #f3f4f6; --bg-sub: #ffffff;
    --border: #d8dde8; --border-soft: #e8ecf3;
    --text: #1a2332; --text-muted: #5f6b7c;
    --heading: #0f1d3d;
  }

  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    font-size: 15px; line-height: 1.6;
  }

  .topbar {
    height: 52px; padding: 0 20px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg); position: sticky; top: 0; z-index: 10;
  }
  .topbar-logo {
    display: flex; align-items: center; gap: 8px;
    font-size: 15px; font-weight: 600; color: var(--heading); text-decoration: none;
  }
  .topbar-logo img { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--gold); }
  .topbar-divider { width: 1px; height: 18px; background: var(--border); }
  .topbar-title { font-size: 14px; color: var(--text-muted); font-weight: 500; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .glass-btn {
    background: var(--glass-btn-bg); border: 1px solid var(--glass-btn-border);
    backdrop-filter: blur(12px); transition: background .15s, border-color .15s;
  }
  .glass-btn:hover { background: var(--glass-btn-hover); }
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: var(--radius);
    color: var(--text); font-size: 13px; text-decoration: none; min-height: 36px;
  }
  .theme-btn {
    width: 36px; height: 36px; border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-muted); border: none;
  }
  .theme-btn svg { width: 18px; height: 18px; }

  .page { max-width: 960px; margin: 0 auto; padding: 28px 20px 48px; }
  .page-header { margin-bottom: 28px; }
  .page-header h1 { font-size: 24px; font-weight: 700; color: var(--heading); }
  .page-header p  { font-size: 13px; color: var(--text-muted); margin-top: 6px; }

  .news-section { margin-bottom: 32px; }
  .section-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border-soft);
  }
  .section-icon { font-size: 18px; }
  .section-title { font-size: 15px; font-weight: 700; color: var(--heading); }
  .section-count {
    margin-left: auto; font-size: 11px; color: var(--text-muted);
    background: var(--bg-sub); border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 999px;
  }

  .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .news-list { display: flex; flex-direction: column; gap: 10px; }

  /* Featured — lajmi kryesor */
  .card-featured {
    display: grid; grid-template-columns: 1fr auto; gap: 16px;
    padding: 20px 22px; border-radius: var(--radius-xl);
    background: linear-gradient(135deg, rgba(201,162,39,.12), rgba(201,162,39,.04));
    border: 1px solid rgba(201,162,39,.35);
    text-decoration: none; color: var(--text);
    transition: transform .15s, box-shadow .15s;
  }
  .card-featured:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(201,162,39,.12); }
  .card-featured .news-badge { background: var(--gold); color: #1a1200; }
  .card-featured .news-title { font-size: 18px; }

  /* Standard grid cards */
  .card-standard, .card-road, .card-law {
    display: flex; flex-direction: column; gap: 6px;
    padding: 16px; border-radius: var(--radius-lg);
    background: var(--bg-sub); border: 1px solid var(--border);
    text-decoration: none; color: var(--text);
    transition: border-color .15s, transform .15s;
  }
  .card-standard:hover, .card-road:hover, .card-law:hover {
    border-color: var(--gold); transform: translateY(-2px);
  }
  .card-road { border-left: 3px solid #3b82f6; }
  .card-law  { border-left: 3px solid #8b5cf6; }

  /* Compact horizontal — policia/ligjore */
  .card-police, .card-compact {
    display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: start;
    padding: 14px 16px; border-radius: var(--radius-lg);
    background: var(--bg-sub); border: 1px solid var(--border);
    text-decoration: none; color: var(--text);
    transition: border-color .15s;
  }
  .card-police { border-left: 3px solid #6366f1; }
  .card-police:hover, .card-compact:hover { border-color: #6366f1; }
  .card-police .news-title { font-size: 14px; }

  /* Alert — gjoba/siguri */
  .card-fine, .card-alert {
    display: flex; flex-direction: column; gap: 6px;
    padding: 14px 16px; border-radius: var(--radius-lg);
    background: rgba(220, 60, 60, .06);
    border: 1px solid rgba(220, 60, 60, .25);
    text-decoration: none; color: var(--text);
    transition: border-color .15s, transform .15s;
  }
  .card-fine:hover, .card-alert:hover {
    border-color: rgba(220, 60, 60, .5); transform: translateY(-1px);
  }
  .card-fine .news-badge, .card-alert .news-badge {
    background: rgba(220, 60, 60, .15); color: #f87171;
  }

  .news-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 999px;
    background: rgba(201,162,39,.15); color: var(--gold);
    width: fit-content;
  }
  .news-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .news-source { font-size: 11px; color: var(--text-muted); font-weight: 600; }
  .news-title  { font-size: 15px; font-weight: 600; line-height: 1.4; }
  .news-summary{ font-size: 12px; color: var(--text-muted); line-height: 1.45; }
  .news-date   { font-size: 11px; color: var(--text-muted); opacity: .7; white-space: nowrap; }

  .news-loading, .no-news {
    text-align: center; padding: 60px 0; color: var(--text-muted); font-size: 14px;
  }
  .spinner {
    width: 28px; height: 28px; border: 3px solid var(--border);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin .7s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .page { padding: 20px 14px 40px; }
    .news-grid { grid-template-columns: 1fr; }
    .card-featured { grid-template-columns: 1fr; }
    .card-police, .card-compact { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="/" class="topbar-logo">
    <img src="/static/ligjbot-logo.png" alt="LIGJBOT" id="nav-logo"/>
    LIGJBOT
  </a>
  <div class="topbar-divider"></div>
  <span class="topbar-title">📰 Lajme</span>
  <div class="topbar-right">
    <a href="/" class="back-btn glass-btn">← Kthehu</a>
    <button class="theme-btn glass-btn" id="theme-btn" onclick="toggleTheme()" type="button" aria-label="Tema">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2"/></svg>
    </button>
  </div>
</div>

<div class="page">
  <div class="page-header">
    <h1>Lajme & Ndryshime Ligjore</h1>
    <p>Informacione të fundit mbi kodin rrugor, gjobat, policinë dhe ligjet shqiptare.</p>
  </div>
  <div id="news-root">
    <div class="news-loading"><div class="spinner"></div>Duke ngarkuar lajmet…</div>
  </div>
</div>

<script>
  const THEME_KEY = "LIGJBOT-theme";
  const ICON_SUN  = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2"/></svg>`;
  const ICON_MOON = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

  const SECTIONS = [
    { key: "featured", icon: "⭐", title: "Në fokus",        cats: null, layout: "featured" },
    { key: "rrugore",  icon: "🛣️", title: "Kodi Rrugor",     cats: ["rrugore"], layout: "grid" },
    { key: "gjoba",    icon: "🚨", title: "Gjoba & Denime",  cats: ["gjoba"], layout: "alert" },
    { key: "policia",  icon: "👮", title: "Polici & Ligje",  cats: ["policia", "ligjore"], layout: "list" },
    { key: "siguri",   icon: "⚠️", title: "Siguria Rrugore", cats: ["siguri"], layout: "alert" },
  ];

  const CAT_LABELS = {
    rrugore: "Rrugor", gjoba: "Gjobë", policia: "Polici",
    ligjore: "Ligj", siguri: "Siguri",
  };

  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    document.getElementById("theme-btn").innerHTML = theme === "dark" ? ICON_SUN : ICON_MOON;
    document.getElementById("theme-color-meta").content = theme === "dark" ? "#0b1018" : "#f3f4f6";
    document.getElementById("nav-logo").src = theme === "dark"
      ? "/static/ligjbot-logo.png" : "/static/ligjbot-logo-light.png";
  }
  function toggleTheme() {
    const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
    applyTheme(next);
    localStorage.setItem(THEME_KEY, next);
  }
  (function() {
    const saved = localStorage.getItem(THEME_KEY);
    applyTheme(saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"));
  })();

  function esc(s) {
    return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function fmtDate(str) {
    if (!str) return "";
    const d = new Date(str);
    return isNaN(d) ? str : d.toLocaleDateString("sq-AL", { day:"2-digit", month:"short", year:"numeric" });
  }

  function cardHtml(a, layout) {
    const cls = a.variant || "card-standard";
    const badge = CAT_LABELS[a.category] || a.category;
  if (layout === "featured") {
      return `<a class="card-featured" href="${esc(a.link)}" target="_blank" rel="noopener">
        <div>
          <span class="news-badge">${esc(badge)} · ${esc(a.source)}</span>
          <h3 class="news-title" style="margin-top:8px">${esc(a.title)}</h3>
          <p class="news-summary" style="margin-top:6px">${esc(a.summary)}</p>
        </div>
        <span class="news-date">${esc(fmtDate(a.published))}</span>
      </a>`;
    }
    if (layout === "list") {
      return `<a class="${cls}" href="${esc(a.link)}" target="_blank" rel="noopener">
        <span class="news-badge">${esc(badge)}</span>
        <div>
          <h3 class="news-title">${esc(a.title)}</h3>
          <p class="news-summary">${esc(a.summary)}</p>
          <span class="news-source">${esc(a.source)}</span>
        </div>
        <span class="news-date">${esc(fmtDate(a.published))}</span>
      </a>`;
    }
    return `<a class="${cls}" href="${esc(a.link)}" target="_blank" rel="noopener">
      <div class="news-meta">
        <span class="news-badge">${esc(badge)}</span>
        <span class="news-source">${esc(a.source)}</span>
      </div>
      <h3 class="news-title">${esc(a.title)}</h3>
      <p class="news-summary">${esc(a.summary)}</p>
      <span class="news-date">${esc(fmtDate(a.published))}</span>
    </a>`;
  }

  function renderSections(articles) {
    const used = new Set();
    const root = document.getElementById("news-root");
    const parts = [];

    for (const sec of SECTIONS) {
      let items;
      if (sec.key === "featured") {
        items = articles.slice(0, 1);
      } else {
        items = articles.filter(a => sec.cats.includes(a.category) && !used.has(a.link));
      }
      items.forEach(a => used.add(a.link));
      if (!items.length) continue;

      const inner = sec.layout === "list"
        ? `<div class="news-list">${items.map(a => cardHtml(a, sec.layout)).join("")}</div>`
        : sec.layout === "featured"
          ? items.map(a => cardHtml(a, sec.layout)).join("")
          : `<div class="news-grid">${items.map(a => cardHtml(a, sec.layout)).join("")}</div>`;

      parts.push(`<section class="news-section">
        <div class="section-head">
          <span class="section-icon">${sec.icon}</span>
          <h2 class="section-title">${sec.title}</h2>
          <span class="section-count">${items.length}</span>
        </div>
        ${inner}
      </section>`);
    }

    const rest = articles.filter(a => !used.has(a.link));
    if (rest.length) {
      parts.push(`<section class="news-section">
        <div class="section-head">
          <span class="section-icon">📋</span>
          <h2 class="section-title">Të tjera</h2>
          <span class="section-count">${rest.length}</span>
        </div>
        <div class="news-grid">${rest.map(a => cardHtml(a, "grid")).join("")}</div>
      </section>`);
    }

    root.innerHTML = parts.join("") || `<div class="no-news">📭 Nuk u gjetën lajme të reja.</div>`;
  }

  async function loadNews() {
    try {
      const res = await fetch("/api/news");
      const data = await res.json();
      if (!data.articles?.length) {
        document.getElementById("news-root").innerHTML = `<div class="no-news">📭 Nuk u gjetën lajme të reja.</div>`;
        return;
      }
      renderSections(data.articles);
    } catch (e) {
      document.getElementById("news-root").innerHTML = `<div class="no-news">⚠️ Gabim gjatë ngarkimit të lajmeve.</div>`;
    }
  }

  loadNews();
</script>
</body>
</html>
